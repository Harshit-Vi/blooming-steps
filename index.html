<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<body>
<div id="wrap">
  <canvas id="game"></canvas>
  <div id="controls">Arrow Keys: Move &nbsp;•&nbsp; E: Interact &nbsp;•&nbsp; Space: Continue</div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════
//   SETUP
// ═══════════════════════════════════════════════════════
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const LW = 256, LH = 160;
const SC = 3;
canvas.width = LW * SC;
canvas.height = LH * SC;

let FC = 0; // frame counter

// ═══════════════════════════════════════════════════════
//   PIXEL HELPERS
// ═══════════════════════════════════════════════════════
const P = (x, y, c, w=1, h=1) => {
  ctx.fillStyle = c;
  ctx.fillRect(x*SC, y*SC, w*SC, h*SC);
};

function lerpC(a, b, t) {
  t = Math.max(0,Math.min(1,t));
  const p = s => [parseInt(s.slice(1,3),16), parseInt(s.slice(3,5),16), parseInt(s.slice(5,7),16)];
  const [ar,ag,ab] = p(a), [br,bg,bb] = p(b);
  const r=Math.round(ar+(br-ar)*t), g=Math.round(ag+(bg-ag)*t), bv=Math.round(ab+(bb-ab)*t);
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${bv.toString(16).padStart(2,'0')}`;
}

// ═══════════════════════════════════════════════════════
//   GAME STATE
// ═══════════════════════════════════════════════════════

// Collectibles per scene

const PUPPY_WP = {

  forest:   [{x:55,y:105},{x:100,y:103},{x:100,y:105}],
  garden:   [{x:55,y:105},{x:120,y:102},{x:158,y:112}],
  ruins:    [{x:55,y:105},{x:80,y:92},{x:150,y:102}],
  doorroom: [{x:55,y:108},{x:120,y:104},{x:120,y:95}],
};
let wpIdx = 0;

// ═══════════════════════════════════════════════════════
//   INPUT
// ═══════════════════════════════════════════════════════
const keys = new Set(), just = new Set();
document.addEventListener('keydown', e => {
  if (!keys.has(e.key)) { keys.add(e.key); just.add(e.key); }
  if ([' ','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => keys.delete(e.key));

// ═══════════════════════════════════════════════════════
//   TRANSITIONS
// ═══════════════════════════════════════════════════════
function fadeOut(cb, ms=380) {
  if (G.fading) return;
  G.fading = true;
  const s = Date.now();
  const t = () => {
    G.fadeAlpha = Math.min(1,(Date.now()-s)/ms);
    if (G.fadeAlpha < 1) requestAnimationFrame(t);
    else { G.fading=false; cb(); }
  };
  t();
}
function fadeIn(ms=380) {
  G.fadeAlpha = 1;
  const s = Date.now();
  const t = () => {
    G.fadeAlpha = 1-Math.min(1,(Date.now()-s)/ms);
    if (G.fadeAlpha > 0) requestAnimationFrame(t);
    else G.fadeAlpha = 0;
  };
  t();
}
function goScene(sc, px, py, dir='down', delay=450, msg=null) {
  fadeOut(() => {
    G.scene = sc;
    G.player.x = px; G.player.y = py; G.player.dir = dir;
    fadeIn();
    if (msg) setTimeout(() => G.dialog=msg, delay);
  });
}

// ═══════════════════════════════════════════════════════
//   SKY GRADIENT
// ═══════════════════════════════════════════════════════
function drawSky(p=0) {
  let t, b;
  if (p < 0.3) { t=lerpC('#87ceeb','#ffb3d9',p/0.3); b=lerpC('#b0e8ff','#ffcba4',p/0.3); }
  else if (p < 0.65) { const q=(p-0.3)/0.35; t=lerpC('#ffb3d9','#ff7eb3',q); b=lerpC('#ffcba4','#ff9060',q); }
  else { const q=(p-0.65)/0.35; t=lerpC('#ff7eb3','#c0418a',q); b=lerpC('#ff9060','#ffdb8b',q); }

  const g = ctx.createLinearGradient(0,0,0,90*SC);
  g.addColorStop(0,t); g.addColorStop(1,b);
  ctx.fillStyle = g;
  ctx.fillRect(0,0,canvas.width,90*SC);

  // Sun
  if (p > 0.25) {
    const sr = 9+p*5, sx=LW*0.82, sy=22-p*12;
    const sc2 = lerpC('#ffffff','#fbbf24',p);
    ctx.fillStyle = sc2;
    ctx.beginPath(); ctx.arc(sx*SC,sy*SC,sr*SC,0,Math.PI*2); ctx.fill();
    const grd = ctx.createRadialGradient(sx*SC,sy*SC,0,sx*SC,sy*SC,(sr+14)*SC);
    grd.addColorStop(0,`rgba(251,191,36,${0.25*p})`);
    grd.addColorStop(1,'rgba(251,191,36,0)');
    ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(sx*SC,sy*SC,(sr+14)*SC,0,Math.PI*2); ctx.fill();
  }

  // Clouds
  if (p < 0.85) {
    const cc = p>0.2 ? lerpC('#ffffff','#ffcdd2',(p-0.2)/0.65) : '#ffffff';
    ctx.fillStyle=cc; ctx.globalAlpha=0.65;
    [[38,18,0.9],[148,12,0.65],[205,22,0.75]].forEach(([x,y,s])=>{
      ctx.beginPath();
      ctx.arc(x*SC,y*SC,7*s*SC,0,Math.PI*2);
      ctx.arc((x+9)*SC,(y-4)*SC,5*s*SC,0,Math.PI*2);
      ctx.arc((x+17)*SC,y*SC,7*s*SC,0,Math.PI*2);
      ctx.fill();
    });
    ctx.globalAlpha=1;
  }
}

// ═══════════════════════════════════════════════════════
//   SCENE: TITLE
// ═══════════════════════════════════════════════════════
function drawTitle() {
  // Deep space bg
  ctx.fillStyle='#07000f'; ctx.fillRect(0,0,canvas.width,canvas.height);

  // Stars
  for (let i=0;i<55;i++) {
    const sx=(i*41+13)%LW, sy=(i*29+7)%115;
    const a=0.35+Math.sin(FC*0.025+i*0.8)*0.4;
    P(sx,sy,`rgba(255,255,255,${a})`);
    if(i%6===0) P(sx+1,sy,`rgba(255,255,255,${a*0.4})`);
  }

  // Moon
  ctx.fillStyle='#fef9c3';
  ctx.beginPath(); ctx.arc(48*SC,30*SC,16*SC,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#07000f';
  ctx.beginPath(); ctx.arc(54*SC,26*SC,13*SC,0,Math.PI*2); ctx.fill();

  // Silhouette ground
  P(0,112,'#050010',LW,48);
  // Tree silhouettes
  [[8,50],[42,68],[88,44],[140,62],[180,50],[210,72],[235,46]].forEach(([x,h])=>{
    P(x,112-h,Math.max(18,h*0.4)|0,h,'#050010');
    P(x-8,112-h-22,Math.max(24,h*0.6)|0,25,'#050010');
  });
  // Flower silhouettes
  for(let fx=4;fx<LW;fx+=9){
    const fh=4+(fx*3)%5;
    P(fx,111,2,fh,'#0d0025');
    P(fx-1,111-fh,5,4,'#150038');
  }

  // Fireflies
  for(let ff=0;ff<12;ff++){
    const ffx=15+(ff*43+FC*0.3)%220, ffy=75+(ff*17+Math.sin(FC*0.02+ff)*20)%35;
    const fa=0.4+Math.sin(FC*0.07+ff*2.3)*0.5;
    if(fa>0.2){
      ctx.fillStyle=`rgba(180,255,120,${fa})`;
      ctx.beginPath(); ctx.arc(ffx*SC,ffy*SC,1.5*SC,0,Math.PI*2); ctx.fill();
    }
  }

  // Title
  ctx.textAlign='center';
  ctx.shadowColor='#f9a8d4'; ctx.shadowBlur=18;
  ctx.fillStyle='#fce7f3';
  ctx.font=`bold ${11*SC}px "Courier New"`;
  ctx.fillText('Blooming',LW/2*SC,52*SC);
  ctx.fillStyle='#e9d5ff';
  ctx.fillText('Steps',LW/2*SC,68*SC);
  ctx.shadowBlur=0;

  ctx.fillStyle='#a78bfa';
  ctx.font=`${4*SC}px "Courier New"`;
  ctx.fillText('a story of magic and wonder',LW/2*SC,82*SC);

  if(Math.sin(FC*0.055)>0){
    ctx.fillStyle='#c084fc';
    ctx.font=`${5*SC}px "Courier New"`;
    ctx.fillText('✦  Press SPACE to begin  ✦',LW/2*SC,105*SC);
  }
  ctx.textAlign='left';
}

// ═══════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════
function drawForest() {

  // BG trees

  ctx.fillStyle='rgba(255,255,200,0.07)';

  // Bushes

  .forEach(([fx,fy,fc])=>{

  const c1 = ITEMS.forest[0];

// --- Magic System ---
function updateMagic() {
  if(!G.magic.handPlaced) return;

  G.magic.sky += 0.002;
  G.magic.treeH += 0.4;

  if(G.player.moving){
    G.magic.footFlowers.push({
      x: G.player.x,
      y: G.player.y,
      life: 60
    });
  }

  G.magic.footFlowers.forEach(f=>f.life--);
  G.magic.footFlowers = G.magic.footFlowers.filter(f=>f.life>0);
}

function drawMagic() {
  if(G.magic.treeH > 0){
    P(124,90-G.magic.treeH,'#166534',8,G.magic.treeH);
  }

  G.magic.footFlowers.forEach(f=>{
    P(f.x,f.y,'#f472b6',3,3);
  });

  if(G.magic.treeH > 40){
    P(110,80,'#fbbf24',20,12);
  }
}


// --- Interaction ---
function interact() {
  if(G.scene === 'forest'){
    const c = ITEMS.forest[0];
    if(!G.collected.has('clue1') && Math.hypot(G.player.x-c.x,G.player.y-c.y)<c.r){
      G.collected.add('clue1');
      G.clues++;
    }
  }

  if(G.scene === 'garden'){
    const c = ITEMS.garden[0];
    if(!G.collected.has('clue2') && Math.hypot(G.player.x-c.x,G.player.y-c.y)<c.r){
      G.collected.add('clue2');
      G.clues++;
    }
  }

  if(G.scene === 'ruins'){
    ITEMS.ruins.forEach(it=>{
      if(!G.collected.has(it.id) && Math.hypot(G.player.x-it.x,G.player.y-it.y)<it.r){
        G.collected.add(it.id);
        if(it.id==='key') G.inv.add('key');
      }
    });
  }

  if(G.scene === 'doorroom'){
    if(G.inv.has('key')){
      G.magic.handPlaced = true;
    }
  }
}


// --- Game Loop ---
function update() {
  G.player.moving = false;

  if(keys.has('ArrowLeft')){ G.player.x-=1; G.player.moving=true; }
  if(keys.has('ArrowRight')){ G.player.x+=1; G.player.moving=true; }
  if(keys.has('ArrowUp')){ G.player.y-=1; G.player.moving=true; }
  if(keys.has('ArrowDown')){ G.player.y+=1; G.player.moving=true; }

  updateMagic();
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(G.scene==='forest') drawForest();
  if(G.scene==='garden') drawGarden();
  if(G.scene==='ruins') drawRuins();
  if(G.scene==='doorroom') drawDoorRoom();

  drawMagic();
}

function loop(){
  FC++;
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
